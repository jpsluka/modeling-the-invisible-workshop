name: Validate and score workshop submissions

on:
  push:
    branches:
      - main
    paths:
      - "data-release/**"
      - "scoring/scripts/**"
      - "notebooks/plot_predictions.py"
      - "requirements.txt"
      - ".github/workflows/score.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: workshop-scoring-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate release files
        run: python scoring/scripts/validate_release.py --root .

      - name: Validate submissions
        run: python scoring/scripts/validate_predictions.py --root .

      - name: Score submissions
        run: python scoring/scripts/score_predictions.py --root .

      - name: Generate plots
        run: python notebooks/plot_predictions.py

      - name: Upload scoring artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workshop-results
          path: |
            scoring/**/*.csv
            scoring/plots/**
          if-no-files-found: error
          retention-days: 30

      - name: Create scoring pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch-token: ${{ secrets.GITHUB_TOKEN }}
          branch: scoring-results
          delete-branch: true
          add-paths: scoring
          commit-message: Update automated leaderboard and plots
          title: Update automated leaderboard and plots
          body: |
            Automated scoring update generated by GitHub Actions.
