name: Validate and score workshop submissions

on:
  push:
    paths:
      - "predictions/**"
      - "data-release/**"
      - "scoring/scripts/**"
      - ".github/workflows/score.yml"

  pull_request:
    paths:
      - "predictions/**"
      - "data-release/**"
      - "scoring/scripts/**"
      - ".github/workflows/score.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: workshop-scoring-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-score:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate prediction files
        run: python scoring/scripts/validate_predictions.py --root .

      - name: Generate scores and leaderboard
        run: python scoring/scripts/score_predictions.py --root .

      - name: Upload scoring artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workshop-scores
          path: |
            scoring/leaderboard.csv
            scoring/results/

      - name: Commit updated leaderboard
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add scoring/leaderboard.csv scoring/results

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update automated leaderboard"
          git push
